name: Gateway tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gateway-contract:
    name: Gateway contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run gateway tests
        run: npm run test:gateway
